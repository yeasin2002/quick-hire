version: "3"

vars:
  COMPOSE_SERVER_FILE: apps/server/docker-compose.yml
  SERVER_SERVICE_NAME: server

tasks:
  default:
    desc: List available Docker tasks
    cmds:
      - task --list

  docker:build:
    desc: Build server container image
    cmds:
      - docker compose -f {{.COMPOSE_SERVER_FILE}} build {{.SERVER_SERVICE_NAME}}

  docker:up:
    desc: Start server container
    cmds:
      - docker compose -f {{.COMPOSE_SERVER_FILE}} up -d {{.SERVER_SERVICE_NAME}}

  docker:down:
    desc: Stop and remove server container
    cmds:
      - docker compose -f {{.COMPOSE_SERVER_FILE}} down

  docker:restart:
    desc: Recreate server container after code changes
    cmds:
      - docker compose -f {{.COMPOSE_SERVER_FILE}} down
      - docker compose -f {{.COMPOSE_SERVER_FILE}} up -d --build {{.SERVER_SERVICE_NAME}}

  docker:logs:
    desc: Show server logs
    cmds:
      - docker compose -f {{.COMPOSE_SERVER_FILE}} logs -f {{.SERVER_SERVICE_NAME}}

  docker:ps:
    desc: Show container status
    cmds:
      - docker compose -f {{.COMPOSE_SERVER_FILE}} ps
