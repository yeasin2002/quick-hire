version: "3"

vars:
  COMPOSE_FILE: apps/server/docker-compose.yml
  SERVICE_NAME: server

tasks:
  default:
    desc: List available Docker tasks
    cmds:
      - task --list

  docker:build:
    desc: Build server container image
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} build {{.SERVICE_NAME}}

  docker:up:
    desc: Start server container
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up -d {{.SERVICE_NAME}}

  docker:down:
    desc: Stop and remove server container
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} down

  docker:logs:
    desc: Show server logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} logs -f {{.SERVICE_NAME}}

  docker:ps:
    desc: Show container status
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} ps
